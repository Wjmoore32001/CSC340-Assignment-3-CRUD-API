<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <title>Edit Character</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <ul class="navbar-nav flex-row gap-3">
        <li class="nav-item">
          <a class="nav-link active" href="index.html">Home</a>
        </li>
        <li>
          <a class="nav-link active" href="about.html">About</a>
        </li>
        <li>
          <a class="nav-link active" href="details.html">Details</a>
        </li>
        <li>
          <a class="nav-link active" href="new-character-form.html">Add a Character</a>
        </li>
      </ul>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="'Character Name'" />
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </nav>

  <div class="container-fluid mt-4">
    <h3>Edit Character</h3>

    <form id="edit-character-form" class="form-control">
      <label class="form-control mb-2">
        Character Name
        <input id="name" type="text" class="form-control" required>
      </label>

      <label class="form-control mb-2">
        Description
        <textarea id="description" class="form-control" rows="4" required></textarea>
      </label>

      <label class="form-control mb-2">
        Character Type
        <select id="characterType" class="form-select" required>
          <option value="JUJUTSU_SORCERER">Jujutsu Sorcerer</option>
          <option value="CURSED_SPIRIT">Cursed Spirit</option>
          <option value="SHIKIGAMI">Shikigami</option>
          <option value="CURSED_CORPSE">Cursed Corpse</option>
        </select>
      </label>

      <label class="form-control mb-2">
        Age
        <input id="age" type="number" class="form-control">
      </label>

      <label class="form-control mb-2">
        Chapter First Appearance
        <input id="chapterFirstAppearance" type="number" class="form-control">
      </label>

      <label class="form-control mb-2">
        Image URL
        <input id="imageUrl" type="text" class="form-control" required>
      </label>

      <div class="mt-4 d-flex gap-3">
        <button type="submit" class="btn btn-outline-success">Save</button>
        <button type="button" id="cancel-button" class="btn btn-outline-secondary">Cancel</button>
      </div>
    </form>

    <p id="form-message" class="mt-3"></p>
  </div>

  <script src="edit-character.js"></script>
</body>

</html>
